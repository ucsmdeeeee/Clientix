services:
  postgres:
    image: postgres:16
    container_name: clientix-postgres
    restart: always
    environment:
      POSTGRES_DB: clientix
      POSTGRES_USER: clientix
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clientix -d clientix"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: clientix-redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: clientix-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: clientix
      RABBITMQ_DEFAULT_PASS: postgres
    ports:
      - "5672:5672"
      - "15672:15672"
    restart: unless-stopped

  botgateway:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: clientix-botgateway
    depends_on:
      - postgres
      - redis
      - rabbitmq
    ports:
      - "5000:5000"
    volumes:
      - ./src/ClientiX.BotGateway/appsettings.Production.json:/app/appsettings.Production.json:ro
      - botgateway_keys:/app/.keys
      - botgateway_logs:/var/log/clientix
    restart: unless-stopped

  webapi:
    build:
      context: .
      dockerfile: Dockerfile.webapi
    container_name: clientix-webapi
    restart: always
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:5050
    volumes:
      - ./src/ClientiX.WebApi/appsettings.Production.json:/app/appsettings.Production.json:ro
      - webapi_logs:/var/log/clientix-webapi
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
        
  landing:
    build:
      context: .
      dockerfile: Dockerfile.landing
    container_name: clientix-landing
    restart: always
    
  master:
    build:
      context: .
      dockerfile: Dockerfile.master
    container_name: clientix-master
    restart: always
    
  caddy:
    image: caddy:2-alpine
    container_name: clientix-caddy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - botgateway
    restart: unless-stopped

volumes:
  postgres_data:
  botgateway_keys:
  caddy_data:
  caddy_config:
  botgateway_logs:
  webapi_logs:
